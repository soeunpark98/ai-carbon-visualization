<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HCDE 511 Skye & June</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              page: "#0f1117",
              surface: "#1e2130",
              rim: "#2e3448",
              muted: "#576070",
              dim: "#3a4050",
              soft: "#c8cfd9",
              body: "#e8eaf0",
            },
            fontFamily: {
              sans: ['"Segoe UI"', "system-ui", "-apple-system", "sans-serif"],
            },
          },
        },
      };
    </script>
    <script src="/d3.v7.min.js"></script>
    <style>
      .bar-bg {
        fill: #1e2130;
      }
      .activity-label {
        font-size: 13px;
        fill: #c8cfd9;
        dominant-baseline: middle;
        text-anchor: end;
      }
      .value-label {
        font-size: 11.5px;
        fill: #8b95a8;
        dominant-baseline: middle;
      }
      .axis path,
      .axis line {
        stroke: #2a2f42;
      }
      .axis text {
        fill: #576070;
        font-size: 11px;
      }
      .axis .domain {
        display: none;
      }
      .grid line {
        stroke: #1e2130;
        stroke-dasharray: 3 4;
      }
      .grid .domain {
        display: none;
      }
      .nav-active {
        color: #e8eaf0;
        border-bottom: 2px solid #a8edea;
        padding-bottom: 2px;
      }
    </style>
  </head>
  <body class="bg-page text-body font-sans min-h-screen">
    <div
      id="root"
      class="flex flex-col items-center px-5 pt-24 pb-16 w-full min-h-screen"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
