<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HCDE 511 Skye & June</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              page: "#0f1117",
              surface: "#1e2130",
              rim: "#2e3448",
              muted: "#576070",
              dim: "#3a4050",
              soft: "#c8cfd9",
              body: "#e8eaf0",
            },
            fontFamily: {
              sans: ['"Geist"', "system-ui", "-apple-system", "sans-serif"],
            },
          },
        },
      };
    </script>
    <script src="/d3.v7.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <script>
      if (window.Chart) {
        Chart.defaults.font.family =
          '"Geist", system-ui, -apple-system, sans-serif';
      }
    </script>
    <style>
      body,
      svg text {
        font-family: "Geist", system-ui, -apple-system, sans-serif;
      }
      .bar-bg {
        fill: #1e2130;
      }
      .activity-label {
        font-size: 13px;
        fill: #c8cfd9;
        dominant-baseline: middle;
        text-anchor: end;
      }
      .value-label {
        font-size: 11.5px;
        fill: #8b95a8;
        dominant-baseline: middle;
      }
      .axis path,
      .axis line {
        stroke: #2a2f42;
      }
      .axis text {
        fill: #576070;
        font-size: 11px;
      }
      .axis .domain {
        display: none;
      }
      .grid line {
        stroke: #1e2130;
        stroke-dasharray: 3 4;
      }
      .grid .domain {
        display: none;
      }
      .nav-active {
        color: #e8eaf0;
        border-bottom: 2px solid #a8edea;
        padding-bottom: 2px;
      }
      #final-hero {
        position: relative;
        isolation: isolate;
        background-color: #07050a;
        background-position: 78% center;
        background-repeat: no-repeat;
        background-size: contain;
      }
      .final-hero-vignette {
        position: absolute;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background: linear-gradient(
            90deg,
            rgba(7, 5, 10, 0.95) 0%,
            rgba(7, 5, 10, 0.72) 38%,
            rgba(7, 5, 10, 0.2) 62%,
            transparent 100%
          ),
          linear-gradient(180deg, transparent 55%, rgba(7, 5, 10, 0.9) 100%);
      }
      .final-hero-grid {
        position: absolute;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background-image: linear-gradient(
            rgba(255, 107, 157, 0.07) 1px,
            transparent 1px
          ),
          linear-gradient(90deg, rgba(255, 107, 157, 0.07) 1px, transparent 1px);
        background-size: 40px 40px;
        mask-image: linear-gradient(90deg, black 0%, black 50%, transparent 80%);
      }
      .final-hero-orb {
        position: absolute;
        z-index: 0;
        border-radius: 50%;
        filter: blur(64px);
        pointer-events: none;
      }
      .final-hero-orb--1 {
        left: -2rem;
        bottom: -4rem;
        width: 18rem;
        height: 18rem;
        background: rgba(255, 107, 157, 0.12);
      }
      .final-hero-copy {
        position: relative;
        max-width: 36rem;
        padding-left: 1.25rem;
        border-left: 5px solid #ff6b9d;
      }
      .final-hero-eyebrow {
        margin: 0 0 0.75rem;
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: #e8eaf0;
      }
      .final-hero-title {
        margin: 0;
        font-size: clamp(2.25rem, 5vw, 3.5rem);
        font-weight: 600;
        line-height: 1.1;
        letter-spacing: -0.03em;
        color: #ff6b9d;
        text-shadow: 0 0 52px rgba(255, 107, 157, 0.4);
      }
      .final-hero-lede {
        margin: 1rem 0 0;
        max-width: 28rem;
        font-size: 0.9375rem;
        line-height: 1.65;
        color: #8b95a8;
      }
      .final-section-head {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
        padding-left: 1.25rem;
        border-left: 5px solid #ff6b9d;
      }
      .final-section-eyebrow {
        margin: 0;
        font-size: 0.875rem;
        font-weight: 600;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: #e8eaf0;
        line-height: 1;
      }
      .final-section-title {
        margin: 0;
        font-size: clamp(1.625rem, 3.5vw, 2.125rem);
        font-weight: 600;
        line-height: 1.25;
        letter-spacing: -0.02em;
        color: #ff6b9d;
        max-width: 42rem;
      }
    </style>
  </head>
  <body class="bg-page text-body font-sans min-h-screen">
    <div
      id="root"
      class="flex flex-col items-center px-5 pt-24 pb-16 w-full min-h-screen"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
